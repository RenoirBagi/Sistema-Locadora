<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Clientes - YOLOOK</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">YOLOOK</a>

      <nav class="main-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="index.html">Aluguéis</a>
        <a href="filmes.html">Filmes</a>
        <a href="clientes.html">Clientes</a>
        <a href="funcionarios.html">Funcionários</a>
      </nav>

      <div class="search-container">
        <input type="search" placeholder="Buscar filme">
      </div>
    </div>
  </header>

  <main class="main-content">
    <h1>Gestão de Clientes</h1>

    <button onclick="window.location.href='novo_cliente.html'">
      Novo Cliente
    </button>

    <table>
      <thead>
        <tr>
          <th>CPF</th>
          <th>Nome</th>
          <th>Idade</th>
          <th>Contato</th>
          <th>Endereço</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="clientes-tbody"></tbody>
    </table>
  </main>

  <div id="modal-editar-cliente" class="modal-overlay">
    <div class="modal-box">
      <h2>Editar Cliente</h2>

      <form id="form-editar-cliente">
        <label for="edit-cpf">CPF</label>
        <input type="text" id="edit-cpf" disabled>

        <label for="edit-nome">Nome</label>
        <input type="text" id="edit-nome" required>

        <label for="edit-idade">Idade</label>
        <input type="number" id="edit-idade" required>

        <label for="edit-contato">Contato</label>
        <input type="text" id="edit-contato" required>

        <label for="edit-endereco">Endereço</label>
        <input type="text" id="edit-endereco" required>

        <div class="modal-actions">
          <button type="button" class="btn-cancelar" onclick="fecharModalCliente()">
            Cancelar
          </button>

          <button type="submit">
            Salvar alterações
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-excluir-cliente" class="modal-overlay">
    <div class="modal-box modal-confirmacao">
      <h2>Excluir Cliente</h2>

      <p id="texto-confirmar-exclusao">
        Tem certeza que deseja excluir este cliente?
      </p>

      <div class="modal-actions">
        <button type="button" class="btn-cancelar" onclick="fecharModalExcluirCliente()">
          Cancelar
        </button>

        <button type="button" class="btn-excluir-confirmar" onclick="confirmarExclusaoCliente()">
          Excluir
        </button>
      </div>
    </div>
  </div>

  <script src="js/dialog.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/config.js"></script>
  <script src="js/clientes.js"></script>
  <script src="js/search.js"></script>
</body>

</html>
